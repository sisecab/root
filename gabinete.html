<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Render Gabinete de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        
        /* Contenedor del Gabinete */
        .enclosure {
            width: 350px;
            height: 450px;
            background-color: #ffffff;
            border: 2px solid #d1d5db;
            position: relative;
            box-shadow: 25px 25px 50px rgba(0,0,0,0.1), inset -5px -5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Pantalla 10x10cm (Proporcional) */
        .industrial-display {
            width: 160px; /* Representación de 10cm */
            height: 160px;
            background-color: #0f172a;
            border: 4px solid #334155;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #22d3ee;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.2);
            margin-bottom: 50px;
        }

        /* Selector Manual */
        .selector-switch {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #475569 0%, #1e293b 100%);
            border-radius: 50%;
            border: 3px solid #94a3b8;
            position: relative;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .selector-handle {
            position: absolute;
            width: 8px;
            height: 35px;
            background-color: #f8fafc;
            left: 50%;
            top: 5px;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .selector-label {
            margin-top: 10px;
            font-size: 10px;
            font-weight: bold;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Ventilación Lateral */
        .vent {
            position: absolute;
            width: 10px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .vent-left { left: -6px; top: 150px; }
        .vent-right { right: -6px; top: 150px; }
        .vent-slot {
            width: 100%;
            height: 4px;
            background-color: #94a3b8;
            border-radius: 2px;
        }

        /* Bisagras y Cerradura */
        .hinge {
            position: absolute;
            left: -4px;
            width: 8px;
            height: 40px;
            background-color: #cbd5e1;
            border-radius: 2px;
        }
        .lock {
            position: absolute;
            right: 20px;
            top: 50%;
            width: 20px;
            height: 20px;
            background-color: #94a3b8;
            border-radius: 4px;
            border: 1px solid #64748b;
        }
    </style>
</head>
<body>

    <div class="enclosure">
        <!-- Rejillas de Ventilación -->
        <div class="vent vent-left">
            <div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div>
        </div>
        <div class="vent vent-right">
            <div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div><div class="vent-slot"></div>
        </div>

        <!-- Bisagras -->
        <div class="hinge" style="top: 50px;"></div>
        <div class="hinge" style="bottom: 50px;"></div>

        <!-- Pantalla Principal -->
        <div class="industrial-display">
            <span style="font-size: 10px; opacity: 0.7;">SISTEMA NIVELES</span>
            <span style="font-size: 24px; font-weight: bold; margin: 10px 0;">80%</span>
            <div style="width: 80%; height: 10px; border: 1px solid #22d3ee; padding: 1px;">
                <div style="width: 80%; height: 100%; background-color: #22d3ee;"></div>
            </div>
            <span style="font-size: 9px; margin-top: 15px; color: #4ade80;">BOMBA: ACTIVA</span>
        </div>

        <!-- Selector Manual -->
        <div class="flex flex-col items-center">
            <div class="selector-switch">
                <div class="selector-handle" style="transform: translateX(-50%) rotate(-45deg); transform-origin: bottom center;"></div>
            </div>
            <div class="flex justify-between w-24 mt-2">
                <span class="text-[8px] font-bold text-slate-400">MAN</span>
                <span class="text-[8px] font-bold text-slate-400">OFF</span>
                <span class="text-[8px] font-bold text-slate-400">AUTO</span>
            </div>
            <span class="selector-label">Modo de Operación</span>
        </div>

        <!-- Cerradura -->
        <div class="lock"></div>

        <!-- Etiqueta de Identificación -->
        <div class="absolute bottom-5 left-5 px-3 py-1 bg-slate-100 border border-slate-200 text-[8px] font-bold text-slate-500 uppercase rounded">
            Control de Fluidos v1.0
        </div>
    </div>

</body>
</html>
